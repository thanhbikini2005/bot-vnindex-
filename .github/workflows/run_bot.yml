name: VN-Index Auto Telegram Bot

on:
  schedule:
    # Chạy tự động vào lúc 09:30 UTC (tức 16:30 chiều giờ Việt Nam từ Thứ 2 đến Thứ 6)
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất kỳ lúc nào để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn từ Repo
      uses: actions/checkout@v3

    - name: Thiết lập môi trường Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cài đặt các thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Chạy mã Python gửi tin nhắn
      env:
        TELEGRAM_TOKEN: ${{ secrets::TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets::TELEGRAM_CHAT_ID }}
      run: python bot.py
