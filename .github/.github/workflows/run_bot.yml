name: Chay Bot Quet Chung Khoan

on:
  schedule:
    # Tự động chạy lúc 15:30 chiều từ Thứ 2 đến Thứ 6 hàng tuần
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # Tạo nút bấm để chạy bằng tay trên điện thoại

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Kiem tra code
      uses: actions/checkout@v3

    - name: Cai dat Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cai dat thu vien can thiet
      run: |
        pip install yfinance pandas requests

    - name: Chay file bot quet tin hieu
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py
